name: Build & Test Spring Boot App

on:
  push:
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        server-username: MAVEN_GITHUB_USERNAME
        server-password: MAVEN_GITHUB_TOKEN

    - name: Ensure Maven wrapper is executable
      run: chmod +x mvnw

    - name: Build with Maven
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      run: ./mvnw -B clean verify
      env:
        MAVEN_GITHUB_USERNAME: ${{ secrets.MAVEN_GITHUB_USERNAME }}
        MAVEN_GITHUB_TOKEN: ${{ secrets.MAVEN_GITHUB_TOKEN }}

    - name: Skip fork pull request build
      if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      run: |
        echo "::warning::Skipping Maven verify for fork pull requests because GitHub Packages credentials are not exposed to pull_request events."
        echo "This repository depends on private GitHub Packages artifacts, so fork PRs cannot run the full build in the default GitHub Actions security model."
