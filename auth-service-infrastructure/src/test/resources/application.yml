#debug: true

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      #    password: # 如果有密码，写在这里；没有就删除这一行
      timeout: 5000


mybatis:
  type-aliases-package: com.example.authservice.infra.po
  mapper-locations: classpath*:mapper/*.xml






